services:
  db:
    image: pgvector/pgvector:pg16
    container_name: legallink-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-legallink}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-legallink}
      POSTGRES_DB: ${POSTGRES_DB:-legallink}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Cap DB memory so OCR/API keep headroom on low-RAM hosts.
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-legallink} -d ${POSTGRES_DB:-legallink}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: legallink-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "noeviction"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: legallink-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      EMBEDDING_CACHE_DIR: /root/.cache/fastembed
      # Low-RAM runtime knobs (override .env if needed)
      OMP_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      FLAGS_use_mkldnn: "0"
      OCR_RENDER_SCALE: "1.0"
      OCR_USE_ANGLE_CLS: "false"
      OCR_MAX_IMAGE_SIDE: "1280"
      EMBEDDING_BATCH_SIZE: "2"
    ports:
      - "${PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - embedding_cache:/root/.cache/fastembed
    # No --reload: reload doubles process memory and is unstable under RAM pressure.
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers 1

  # Celery worker: runs the long-running LangGraph ingestion pipeline off the
  # request path. Shares the backend image + embedding model cache.
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: legallink-worker
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      EMBEDDING_CACHE_DIR: /root/.cache/fastembed
      OMP_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      FLAGS_use_mkldnn: "0"
      OCR_RENDER_SCALE: "1.0"
      OCR_USE_ANGLE_CLS: "false"
      OCR_MAX_IMAGE_SIDE: "1280"
      EMBEDDING_BATCH_SIZE: "2"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - embedding_cache:/root/.cache/fastembed
    # Single worker/concurrency=1 keeps memory bounded on low-RAM hosts.
    command: >
      celery -A app.core.celery_app:celery_app worker
      --loglevel=info
      --concurrency=1
      --max-tasks-per-child=20

volumes:
  postgres_data:
  embedding_cache:
  redis_data:
