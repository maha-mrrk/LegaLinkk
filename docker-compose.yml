services:
  db:
    image: postgres:16-alpine
    container_name: legallink-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-legallink}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-legallink}
      POSTGRES_DB: ${POSTGRES_DB:-legallink}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-legallink} -d ${POSTGRES_DB:-legallink}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: legallink-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    ports:
      - "${PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

volumes:
  postgres_data:
